services:
  - type: web
    name: salesbot-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEYS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: salesbot-db
          property: connectionString

databases:
  - name: salesbot-db
    databaseName: salesbot
    user: salesbot_user
    plan: free
